<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #0D0D0D;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    color: #F0F0F0;
    overflow: hidden;
    position: relative;
    padding: 70px 90px 70px 100px;
  }

  /* Subtle left bar */
  .accent-bar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, #E63946 0%, transparent 60%);
  }

  /* Slide number — top left */
  .slide-num {
    font-size: 12px;
    font-weight: 700;
    color: #E63946;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  /* Narrative block */
  .narrative {
    font-size: 30px;
    font-weight: 400;
    line-height: 1.7;
    color: #E8E8E8;
    max-width: 860px;
    flex-shrink: 0;
  }

  .narrative strong {
    font-weight: 700;
    color: #FFFFFF;
  }

  .narrative .accent {
    color: #E63946;
    font-weight: 600;
  }

  .narrative .dim {
    color: #888888;
  }

  /* Thin divider between text and meme */
  .separator {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, #E63946, transparent);
    margin: 28px 0;
    flex-shrink: 0;
  }

  /* Meme container */
  .meme-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    justify-content: center;
    gap: 14px;
  }

  .meme-block img {
    max-width: 580px;
    max-height: 280px;
    object-fit: contain;
    border-radius: 8px;
    filter: brightness(0.95);
  }

  /* Meme caption */
  .meme-caption {
    font-size: 18px;
    font-style: italic;
    color: #666666;
    text-align: center;
    letter-spacing: 0.3px;
  }

  /* No meme fallback */
  .no-meme {
    width: 580px;
    height: 200px;
    border: 1px solid #222;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #333;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Watermark */
  .watermark {
    position: absolute;
    bottom: 42px;
    right: 70px;
    font-size: 13px;
    font-weight: 600;
    color: #2a2a2a;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>

  <div class="slide-num">{{SLIDE_NUMBER}} / 08</div>

  <div class="narrative">{{NARRATIVE_TEXT}}</div>

  <div class="separator"></div>

  <div class="meme-block">
    {{#if MEME_SRC}}
      <img src="{{MEME_SRC}}" alt="meme">
    {{else}}
      <div class="no-meme">[ meme here ]</div>
    {{/if}}
    <div class="meme-caption">{{MEME_CAPTION}}</div>
  </div>

  <div class="watermark">@stopnormalisasi.id</div>
</body>
</html>
