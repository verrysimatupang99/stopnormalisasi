<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #111111;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    color: #F5F5F5;
    overflow: hidden;
    position: relative;
  }

  .slide-number {
    position: absolute;
    top: 40px;
    left: 60px;
    font-size: 16px;
    color: #555555;
    letter-spacing: 2px;
  }

  .narrative-section {
    flex: 0 0 auto;
    padding: 90px 80px 30px 80px;
    min-height: 400px;
  }

  .slide-label {
    font-size: 14px;
    color: #E63946;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
    font-weight: 600;
  }

  .narrative-text {
    font-size: 32px;
    line-height: 1.6;
    font-weight: 400;
    color: #E8E8E8;
  }

  .narrative-text .highlight {
    color: #E63946;
    font-weight: 700;
  }

  .narrative-text .data {
    color: #E63946;
    font-weight: 700;
    font-size: 36px;
  }

  .meme-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 80px 40px 80px;
  }

  .meme-container {
    width: 600px;
    height: 400px;
    background: #1a1a1a;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 1px solid #333;
  }

  .meme-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .meme-placeholder {
    color: #555;
    font-size: 20px;
    font-style: italic;
  }

  .meme-caption {
    margin-top: 20px;
    font-size: 22px;
    color: #888888;
    font-style: italic;
    text-align: center;
  }

  .watermark {
    position: absolute;
    bottom: 30px;
    right: 60px;
    font-size: 16px;
    color: #333333;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="slide-number">{{SLIDE_NUM}} / 8</div>

  <div class="narrative-section">
    <div class="slide-label">{{SLIDE_LABEL}}</div>
    <div class="narrative-text">{{NARRATIVE_TEXT}}</div>
  </div>

  <div class="meme-section">
    <div class="meme-container">
      {{MEME_IMAGE}}
    </div>
    <div class="meme-caption">"{{MEME_CAPTION}}"</div>
  </div>

  <div class="watermark">@stopnormalisasi.id</div>
</body>
</html>
