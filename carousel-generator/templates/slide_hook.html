<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #0D0D0D;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    color: #F0F0F0;
    overflow: hidden;
    position: relative;
    padding: 0 100px;
  }

  /* Subtle grain texture overlay */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Left accent bar */
  .accent-bar {
    position: absolute;
    left: 0;
    top: 200px;
    bottom: 200px;
    width: 5px;
    background: linear-gradient(180deg, transparent, #E63946, transparent);
  }

  /* Top label */
  .label {
    position: absolute;
    top: 60px;
    left: 100px;
    font-size: 13px;
    font-weight: 600;
    color: #E63946;
    letter-spacing: 4px;
    text-transform: uppercase;
    z-index: 1;
  }

  /* Main hook text */
  .hook-text {
    font-size: 58px;
    font-weight: 900;
    line-height: 1.2;
    letter-spacing: -1.5px;
    z-index: 1;
    max-width: 820px;
  }

  .hook-text .accent {
    color: #E63946;
  }

  .hook-text .dim {
    color: #888888;
  }

  /* Red underline divider */
  .divider {
    width: 48px;
    height: 4px;
    background: #E63946;
    margin-top: 48px;
    z-index: 1;
    border-radius: 2px;
  }

  /* Slide counter */
  .slide-counter {
    position: absolute;
    bottom: 60px;
    left: 100px;
    font-size: 13px;
    color: #444;
    letter-spacing: 3px;
    z-index: 1;
  }

  .slide-counter span {
    color: #E63946;
  }

  /* Watermark */
  .watermark {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 15px;
    font-weight: 600;
    color: #333;
    letter-spacing: 1px;
    z-index: 1;
  }

  /* Corner decoration */
  .corner-dot {
    position: absolute;
    top: 55px;
    right: 80px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #E63946;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="label">stop normalisasi</div>
  <div class="corner-dot"></div>

  <div class="hook-text">{{HOOK_TEXT}}</div>
  <div class="divider"></div>

  <div class="slide-counter"><span>01</span> / 08</div>
  <div class="watermark">@stopnormalisasi.id</div>
</body>
</html>
