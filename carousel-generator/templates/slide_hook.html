<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #111111;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #F5F5F5;
    overflow: hidden;
    position: relative;
  }

  .slide-number {
    position: absolute;
    top: 40px;
    left: 60px;
    font-size: 16px;
    color: #555555;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .hook-text {
    font-size: 54px;
    font-weight: 800;
    line-height: 1.3;
    text-align: center;
    padding: 0 100px;
    letter-spacing: -0.5px;
  }

  .hook-text .accent {
    color: #E63946;
  }

  .watermark {
    position: absolute;
    bottom: 50px;
    right: 60px;
    font-size: 18px;
    color: #444444;
    letter-spacing: 1px;
  }

  .divider {
    width: 60px;
    height: 3px;
    background: #E63946;
    margin-top: 40px;
  }
</style>
</head>
<body>
  <div class="slide-number">1 / 8</div>
  <div class="hook-text">{{HOOK_TEXT}}</div>
  <div class="divider"></div>
  <div class="watermark">@stopnormalisasi.id</div>
</body>
</html>
