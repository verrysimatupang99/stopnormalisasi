<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #0D0D0D;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    color: #F0F0F0;
    overflow: hidden;
    position: relative;
    padding: 0 100px;
  }

  /* Full left bar */
  .accent-bar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, transparent 10%, #E63946 50%, transparent 90%);
  }

  /* Top label */
  .label {
    position: absolute;
    top: 60px;
    left: 100px;
    font-size: 13px;
    font-weight: 600;
    color: #444;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* Question mark big bg */
  .bg-symbol {
    position: absolute;
    right: 60px;
    bottom: 80px;
    font-size: 320px;
    font-weight: 900;
    color: #1a1a1a;
    line-height: 1;
    user-select: none;
  }

  /* CTA question */
  .cta-text {
    font-size: 44px;
    font-weight: 800;
    line-height: 1.3;
    letter-spacing: -0.5px;
    z-index: 1;
    max-width: 820px;
    margin-bottom: 40px;
  }

  .cta-text .accent {
    color: #E63946;
  }

  /* Sub text */
  .sub-text {
    font-size: 24px;
    font-weight: 400;
    color: #666666;
    line-height: 1.6;
    max-width: 700px;
    z-index: 1;
    margin-bottom: 48px;
  }

  /* Divider */
  .divider {
    width: 48px;
    height: 4px;
    background: #E63946;
    border-radius: 2px;
    margin-bottom: 48px;
    z-index: 1;
  }

  /* Hashtags */
  .hashtags {
    font-size: 18px;
    color: #444444;
    letter-spacing: 0.5px;
    z-index: 1;
    line-height: 2;
  }

  .hashtags span {
    color: #E63946;
    margin-right: 8px;
  }

  /* Handle */
  .handle {
    position: absolute;
    bottom: 60px;
    left: 100px;
    font-size: 18px;
    font-weight: 700;
    color: #E63946;
    letter-spacing: 1px;
    z-index: 1;
  }

  /* Slide counter */
  .slide-counter {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 13px;
    color: #333;
    letter-spacing: 3px;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="label">diskusi</div>
  <div class="bg-symbol">?</div>

  <div class="cta-text">{{CTA_QUESTION}}</div>
  <div class="divider"></div>
  <div class="sub-text">{{CTA_SUBTEXT}}</div>
  <div class="hashtags">
    <span>{{HASHTAG_1}}</span>
    <span>{{HASHTAG_2}}</span>
    <span>{{HASHTAG_3}}</span>
  </div>

  <div class="handle">@stopnormalisasi.id</div>
  <div class="slide-counter">08 / 08</div>
</body>
</html>
